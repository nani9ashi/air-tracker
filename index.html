<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#07110F" />
    <meta name="description" content="自転車のタイヤに空気を入れてからの経過日数を記録するモバイルアプリ" />

    <!-- PWA / iOS（ホーム画面追加・スタンドアロン起動） -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QUUKI" />

    <!-- フォントは自己ホスト（@fontsource, src/main.jsx で読込）。CDN 依存なし＝オフライン/初回起動でも崩れない。 -->
    <!-- 起動スプラッシュ（React マウント前・バンドル CSS 読込前）用に Saira 800 を先読み。 -->
    <link rel="preload" href="./fonts/saira-800.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: 'Saira';
        font-style: normal;
        font-weight: 800;
        font-display: swap;
        src: url('./fonts/saira-800.woff2') format('woff2');
      }
    </style>

    <title>QUUKI</title>
  </head>
  <body>
    <div id="root">
      <!-- 起動スプラッシュ（React マウントで置換される。CSS 読込前でも出るようインラインスタイル） -->
      <div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#07110F;">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="quuki-splash" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#34E0D2" />
              <stop offset="1" stop-color="#0DA9A9" />
            </linearGradient>
          </defs>
          <g transform="translate(-2 0)" stroke="url(#quuki-splash)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 16 L34 32 L16 48" />
            <path d="M34 16 L52 32 L34 48" />
          </g>
        </svg>
        <span style="font-family:'Saira',sans-serif;font-weight:800;font-size:30px;letter-spacing:0.06em;color:#fff;">QUUKI</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
