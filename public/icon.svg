<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Air Tracker">
  <defs>
    <radialGradient id="bg" cx="32%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#16C5C0" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#0A6E72" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#07110F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5FF0E4"/>
      <stop offset="100%" stop-color="#0DA9A9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full-bleed dark background (maskable safe) -->
  <rect width="512" height="512" fill="#07110F"/>
  <rect width="512" height="512" fill="url(#bg)"/>

  <g filter="url(#glow)">
    <!-- Tire (outer ring) -->
    <circle cx="256" cy="256" r="150" fill="none" stroke="url(#tire)" stroke-width="30"/>

    <!-- Spokes -->
    <g stroke="#DCE0E8" stroke-width="7" stroke-linecap="round" opacity="0.9">
      <line x1="256" y1="256" x2="256" y2="120"/>
      <line x1="256" y1="256" x2="392" y2="256"/>
      <line x1="256" y1="256" x2="256" y2="392"/>
      <line x1="256" y1="256" x2="120" y2="256"/>
      <line x1="256" y1="256" x2="352" y2="160"/>
      <line x1="256" y1="256" x2="160" y2="160"/>
      <line x1="256" y1="256" x2="352" y2="352"/>
      <line x1="256" y1="256" x2="160" y2="352"/>
    </g>

    <!-- Hub -->
    <circle cx="256" cy="256" r="34" fill="#07110F" stroke="url(#tire)" stroke-width="10"/>
    <circle cx="256" cy="256" r="12" fill="#5FF0E4"/>
  </g>
</svg>
